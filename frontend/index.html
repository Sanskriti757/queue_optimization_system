<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3 class="mb-4 text-center">Add Patient</h3>

        <form action="/add_patient" method="POST">

            <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>

            <input type="number" name="age" class="form-control mb-3" placeholder="Age" required>

            <select name="condition" class="form-control mb-3">
                <option>Emergency</option>
                <option>Moderate</option>
                <option>Normal</option>
            </select>

            <input type="text" name="doctor" class="form-control mb-3" placeholder="Doctor Name" required>

            <button class="btn btn-primary w-100">Add Patient</button>
        </form>

    </div>
</div>

</body>
</html>
